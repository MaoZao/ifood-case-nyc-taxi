# ============================================================================
# Auto PR — cria automaticamente um Pull Request ao fazer push em branches
# de trabalho. Basta `git push` da sua feature que a PR aparece.
#
# Regra de destino (base):
#   feature/**  -> develop
#   fix/**      -> develop
#   release/**  -> main
#   hotfix/**   -> main
# ============================================================================
name: Auto PR

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "release/**"
      - "hotfix/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve destination branch
        id: dest
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            release/*|hotfix/*) echo "base=main" >> "$GITHUB_OUTPUT" ;;
            *)                  echo "base=develop" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Branch '$BRANCH' -> base '$(grep base "$GITHUB_OUTPUT" | cut -d= -f2)'"

      - name: Create Auto Pull Request
        uses: diillson/auto-pull-request@v1.0.1
        with:
          source_branch: ""
          destination_branch: ${{ steps.dest.outputs.base }}
          pr_title: "Auto PR: ${{ github.ref_name }} → ${{ steps.dest.outputs.base }}"
          pr_body: |
            :robot: **Pull request automatico**

            - **Branch de origem:** `${{ github.ref_name }}`
            - **Branch de destino:** `${{ steps.dest.outputs.base }}`
            - **Evento:** `${{ github.event_name }}`

            CI (lint + testes + smoke) roda automaticamente nesta PR.
            Preencha a descricao e o checklist do template antes do merge.
          pr_label: "auto-pr;feature"
          pr_reviewer: ""
          pr_assignee: ""
          pr_draft: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
