# ============================================================================
# Auto PR — cascata de promoção automática entre ambientes.
#
# Fluxo:
#   feature/** / fix/**  →  PR para develop
#   develop (merge)      →  PR para hom
#   hom     (merge)      →  PR para main
#   hotfix/**            →  PR para main (bypass)
#
# A action é idempotente: se já existe PR aberta, não duplica.
# Quando develop/hom recebem novos merges, a PR existente já reflete
# as mudanças automaticamente (o GitHub atualiza o diff do branch).
# ============================================================================
name: Auto PR

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "develop"
      - "hom"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-auto-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve destination branch
        id: dest
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            hotfix/*)  BASE="main"    ; LABEL="auto-pr,hotfix"    ;;
            feature/*) BASE="develop" ; LABEL="auto-pr,feature"   ;;
            fix/*)     BASE="develop" ; LABEL="auto-pr,fix"       ;;
            develop)   BASE="hom"     ; LABEL="auto-pr,promotion" ;;
            hom)       BASE="main"    ; LABEL="auto-pr,promotion" ;;
            *)         echo "::notice::Branch '$BRANCH' sem regra de destino — ignorando." ; exit 0 ;;
          esac
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "::notice::$BRANCH → $BASE"

      - name: Create Auto Pull Request
        if: steps.dest.outputs.base != ''
        uses: diillson/auto-pull-request@v1.0.1
        with:
          source_branch: ""
          destination_branch: ${{ steps.dest.outputs.base }}
          pr_title: "Auto PR: ${{ github.ref_name }} → ${{ steps.dest.outputs.base }}"
          pr_body: |
            :robot: **Pull request automatico**

            - **Origem:** `${{ github.ref_name }}`
            - **Destino:** `${{ steps.dest.outputs.base }}`
            - **Evento:** `${{ github.event_name }}`

            CI (lint + testes + smoke) roda automaticamente nesta PR.
            Preencha a descricao e o checklist do template antes do merge.
          pr_label: ${{ steps.dest.outputs.label }}
          pr_reviewer: ""
          pr_assignee: ""
          pr_draft: false
          github_token: ${{ secrets.AUTO_PR_TOKEN || secrets.GITHUB_TOKEN }}
