<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EA1D2C"/><stop offset="1" stop-color="#FF5A5F"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CD7F32"/><stop offset="1" stop-color="#A9661F"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8BFC9"/><stop offset="1" stop-color="#8A93A0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#D4A017"/>
    </linearGradient>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa3af"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1a1a2e" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1180" height="520" fill="#f4f5f7"/>

  <!-- Header -->
  <rect x="0" y="0" width="1180" height="74" fill="url(#hdr)"/>
  <text x="34" y="38" fill="#fff" font-size="22" font-weight="800">NYC Taxi Data Lakehouse — Arquitetura Medallion</text>
  <text x="34" y="60" fill="#ffe3e5" font-size="13">PySpark · Delta Lake · Spark SQL  |  Case Técnico Data Architect — iFood</text>
  <text x="1146" y="46" text-anchor="end" fill="#fff" font-size="13" font-weight="700" opacity="0.9">iFood</text>

  <!-- Source -->
  <g filter="url(#sh)">
    <rect x="28" y="170" width="150" height="120" rx="14" fill="#ffffff" stroke="#e3e5ea"/>
  </g>
  <text x="103" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#444">FONTE</text>
  <text x="103" y="212" text-anchor="middle" font-size="30">🗽</text>
  <text x="103" y="244" text-anchor="middle" font-size="12.5" font-weight="700" fill="#222">NYC TLC</text>
  <text x="103" y="262" text-anchor="middle" font-size="11" fill="#777">Yellow Taxi</text>
  <text x="103" y="277" text-anchor="middle" font-size="11" fill="#777">Jan–Mai 2023</text>

  <!-- Landing -->
  <g filter="url(#sh)">
    <rect x="218" y="170" width="150" height="120" rx="14" fill="#ffffff" stroke="#e3e5ea"/>
  </g>
  <text x="293" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#444">LANDING</text>
  <text x="293" y="210" text-anchor="middle" font-size="26">📥</text>
  <text x="293" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#222">Parquet bruto</text>
  <text x="293" y="258" text-anchor="middle" font-size="10.5" fill="#777">download idempotente</text>
  <text x="293" y="273" text-anchor="middle" font-size="10.5" fill="#777">S3 / local / DBFS</text>

  <!-- Bronze -->
  <g filter="url(#sh)">
    <rect x="408" y="170" width="150" height="120" rx="14" fill="url(#bronze)"/>
  </g>
  <text x="483" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#A9661F">BRONZE</text>
  <text x="483" y="210" text-anchor="middle" font-size="24" fill="#fff">🥉</text>
  <text x="483" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Raw imutável</text>
  <text x="483" y="256" text-anchor="middle" font-size="10.5" fill="#fff8ef">as-is + linhagem</text>
  <text x="483" y="271" text-anchor="middle" font-size="10.5" fill="#fff8ef">backfill garantido</text>

  <!-- Silver -->
  <g filter="url(#sh)">
    <rect x="598" y="170" width="150" height="120" rx="14" fill="url(#silver)"/>
  </g>
  <text x="673" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#5b6670">SILVER</text>
  <text x="673" y="208" text-anchor="middle" font-size="24" fill="#fff">🥈</text>
  <text x="673" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Trusted</text>
  <text x="673" y="254" text-anchor="middle" font-size="10.5" fill="#f4f6f8">5 colunas · tipagem</text>
  <text x="673" y="269" text-anchor="middle" font-size="10.5" fill="#f4f6f8">limpeza · partição</text>

  <!-- DQ gate badge -->
  <g filter="url(#sh)">
    <rect x="612" y="308" width="122" height="30" rx="15" fill="#119C55"/>
  </g>
  <text x="673" y="328" text-anchor="middle" font-size="11.5" font-weight="700" fill="#fff">✓ Data Quality gate</text>

  <!-- Gold -->
  <g filter="url(#sh)">
    <rect x="788" y="170" width="150" height="120" rx="14" fill="url(#gold)"/>
  </g>
  <text x="863" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#B8860B">GOLD</text>
  <text x="863" y="208" text-anchor="middle" font-size="24">🥇</text>
  <text x="863" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#5a4708">Consumo</text>
  <text x="863" y="254" text-anchor="middle" font-size="10.5" fill="#6b5410">agregações KPI</text>
  <text x="863" y="269" text-anchor="middle" font-size="10.5" fill="#6b5410">Delta · ACID</text>

  <!-- Consumers -->
  <g filter="url(#sh)">
    <rect x="978" y="150" width="172" height="160" rx="14" fill="#1a1a1f"/>
  </g>
  <text x="1064" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#444">CONSUMO</text>
  <text x="1064" y="182" text-anchor="middle" font-size="12.5" fill="#fff" font-weight="700">Spark SQL / PySpark</text>
  <text x="1064" y="208" text-anchor="middle" font-size="12" fill="#ffd0d3">📊 Dashboard iFood</text>
  <text x="1064" y="232" text-anchor="middle" font-size="12" fill="#cfd3da">📈 BI (PowerBI/Tableau)</text>
  <text x="1064" y="256" text-anchor="middle" font-size="12" fill="#cfd3da">🔬 Data Science / ML</text>
  <text x="1064" y="286" text-anchor="middle" font-size="11" fill="#8a909b">Q1 · receita mensal</text>
  <text x="1064" y="300" text-anchor="middle" font-size="11" fill="#8a909b">Q2 · passageiros/hora</text>

  <!-- Arrows -->
  <g stroke="#9aa3af" stroke-width="2.4" fill="none">
    <line x1="180" y1="230" x2="214" y2="230" marker-end="url(#arr)"/>
    <line x1="370" y1="230" x2="404" y2="230" marker-end="url(#arr)"/>
    <line x1="560" y1="230" x2="594" y2="230" marker-end="url(#arr)"/>
    <line x1="750" y1="230" x2="784" y2="230" marker-end="url(#arr)"/>
    <line x1="940" y1="230" x2="974" y2="230" marker-end="url(#arr)"/>
  </g>

  <!-- Cross-cutting band -->
  <g filter="url(#sh)">
    <rect x="28" y="386" width="1122" height="96" rx="14" fill="#ffffff" stroke="#e3e5ea"/>
  </g>
  <text x="48" y="412" font-size="12.5" font-weight="800" fill="#EA1D2C">CROSS-CUTTING / ENGENHARIA</text>
  <g font-size="12" fill="#333">
    <text x="48" y="440">⚙️  Orquestração: CLI por estágio (Airflow / Databricks Workflows)</text>
    <text x="48" y="462">🧪  Testes: pytest + contratos de Data Quality</text>
    <text x="430" y="440">🐳  Docker Compose: Spark + Jupyter + MinIO (S3)</text>
    <text x="430" y="462">🔁  CI/CD: GitHub Actions (lint · testes · smoke)</text>
    <text x="800" y="440">🗂️  Config-driven: YAML + env (local ⇄ cloud)</text>
    <text x="800" y="462">⏪  Delta: ACID · Time Travel · schema evolution</text>
  </g>
</svg>
