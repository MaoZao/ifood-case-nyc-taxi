# Ambiente reproduzível: Spark+Jupyter para o pipeline, e MinIO opcional como
# S3 local — demonstra o caminho para storage em nuvem sem custo.
services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifood-spark
    ports:
      - "8888:8888"   # JupyterLab
      - "4040:4040"   # Spark UI
    volumes:
      - ./:/home/jovyan/work
    environment:
      # Modo local por padrão; defina IFOOD_ENV=cloud + IFOOD_S3_ENDPOINT (ver
      # .env) para gravar o lakehouse no MinIO via conf/pipeline.cloud.yaml.
      - IFOOD_ENV=${IFOOD_ENV:-local}
      - IFOOD_S3_ENDPOINT=${IFOOD_S3_ENDPOINT:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minio}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minio123}
      - IFOOD_S3_PATH_STYLE=true
      - JUPYTER_ENABLE_LAB=yes
    command: >
      start-notebook.sh
      --NotebookApp.token=''
      --NotebookApp.notebook_dir=/home/jovyan/work

  # S3 local opcional. Suba com:  docker compose --profile cloud up
  minio:
    image: minio/minio:latest
    container_name: ifood-minio
    profiles: ["cloud"]
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # Cria o bucket do lakehouse assim que o MinIO sobe (s3a não cria bucket).
  createbuckets:
    image: minio/mc:latest
    container_name: ifood-createbuckets
    profiles: ["cloud"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do echo 'aguardando MinIO...'; sleep 2; done;
      mc mb -p local/ifood-lakehouse;
      echo 'bucket ifood-lakehouse pronto';
      "

volumes:
  minio-data:
